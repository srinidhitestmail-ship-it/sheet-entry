<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Permissions-Policy" content="camera=*">
  <title>Data Entry</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f; --surface: #1a1a1a; --border: #2e2e2e;
      --accent: #c8f135; --text: #f0f0f0; --muted: #666;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center; padding: 2rem;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 2.5rem 2rem;
      width: 100%; max-width: 440px;
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .sheet-label { font-size: 0.7rem; color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 0.4rem; }
    h1 { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; margin-bottom: 0.3rem; }
    .sub { font-size: 0.75rem; color: var(--muted); margin-bottom: 2rem; }
    .divider { height: 1px; background: var(--border); margin-bottom: 1.8rem; }
    label { display: block; font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }
    .input-row { display: flex; gap: 0.5rem; align-items: center; }
    input[type="text"] {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.75rem 1rem;
      font-family: 'DM Mono', monospace; font-size: 0.95rem;
      color: var(--text); outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(200,241,53,0.1); }
    input::placeholder { color: #3a3a3a; }
    .field-hint { font-size: 0.68rem; color: #444; margin-top: 0.4rem; }
    .scan-btn {
      background: #1f1f1f; border: 1px solid var(--border);
      border-radius: 8px; padding: 0.75rem 0.85rem;
      cursor: pointer; color: var(--accent); font-size: 1.2rem;
      transition: background 0.2s, border-color 0.2s;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .scan-btn:hover { background: #252525; border-color: var(--accent); }
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.92); z-index: 100;
      align-items: center; justify-content: center; padding: 1rem;
      flex-direction: column;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 1.5rem;
      width: 100%; max-width: 400px;
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .modal-title { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; }
    .close-btn { background: none; border: none; color: var(--muted); font-size: 1.2rem; cursor: pointer; padding: 0.2rem 0.5rem; border-radius: 4px; }
    .close-btn:hover { color: var(--text); }

    /* Video + canvas overlay */
    .video-wrap {
      position: relative; width: 100%;
      border-radius: 10px; overflow: hidden;
      background: #000; aspect-ratio: 4/3;
    }
    video { width: 100%; height: 100%; object-fit: cover; display: block; }
    #overlayCanvas {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; display: block;
    }

    /* Detected number display */
    .detected-box {
      margin-top: 0.8rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      text-align: center;
      min-height: 2.8rem;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 0.2rem;
    }
    .detected-label {
      font-size: 0.65rem; color: var(--muted);
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    .detected-number {
      font-size: 1.3rem; font-weight: 500;
      color: var(--accent); letter-spacing: 0.08em;
      font-family: 'Syne', sans-serif;
      min-height: 1.6rem;
    }
    .detected-number.scanning {
      font-size: 0.75rem;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-weight: 400;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* Confirm button */
    .confirm-btn {
      width: 100%; margin-top: 0.8rem;
      background: var(--accent); color: #0f0f0f;
      border: none; border-radius: 8px; padding: 0.85rem;
      font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: background 0.15s, transform 0.15s;
      letter-spacing: 0.05em; display: none;
    }
    .confirm-btn.visible { display: block; }
    .confirm-btn:hover { background: #d8ff3a; transform: translateY(-1px); }

    .tip { margin-top: 0.7rem; font-size: 0.68rem; color: #444; text-align: center; line-height: 1.6; }

    /* Main submit */
    button.submit-btn {
      margin-top: 1.8rem; width: 100%; background: var(--accent);
      color: #0f0f0f; border: none; border-radius: 8px; padding: 0.85rem;
      font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; letter-spacing: 0.05em; transition: transform 0.15s, box-shadow 0.15s;
    }
    button.submit-btn:hover { background: #d8ff3a; box-shadow: 0 4px 20px rgba(200,241,53,0.3); transform: translateY(-1px); }
    button.submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .status { margin-top: 1rem; padding: 0.65rem 1rem; border-radius: 8px; font-size: 0.78rem; text-align: center; display: none; }
    .status.success { display: block; background: rgba(200,241,53,0.08); border: 1px solid rgba(200,241,53,0.3); color: var(--accent); }
    .status.error { display: block; background: rgba(255,80,80,0.08); border: 1px solid rgba(255,80,80,0.3); color: #ff6b6b; }
    .footer { margin-top: 2rem; text-align: center; font-size: 0.65rem; color: #333; letter-spacing: 0.08em; }
  </style>
</head>
<body>

<div class="card">
  <div class="sheet-label">testsheet · col A</div>
  <h1>Data Entry</h1>
  <p class="sub">Scan label or type serial number</p>
  <div class="divider"></div>
  <label for="serial">Serial</label>
  <div class="input-row">
    <input type="text" id="serial" placeholder="e.g. 250324960024" autocomplete="off"/>
    <button class="scan-btn" onclick="openScanner()" title="Scan label">📷</button>
  </div>
  <div class="field-hint">Maps to → Serial (Column A) · 12-digit number</div>
  <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">Submit to Sheet</button>
  <div class="status" id="status"></div>
  <div class="footer">TESTSHEET · GOOGLE SHEETS CONNECTOR</div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">📷 Scan Label</span>
      <button class="close-btn" onclick="closeScanner()">✕</button>
    </div>

    <div class="video-wrap">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="overlayCanvas"></canvas>
    </div>

    <div class="detected-box">
      <div class="detected-label">Detected Number</div>
      <div class="detected-number scanning" id="detectedNumber">Scanning…</div>
    </div>

    <button class="confirm-btn" id="confirmBtn" onclick="confirmNumber()">
      ✅ Confirm & Use This Number
    </button>

    <div class="tip">💡 Point at the big number · hold steady · good light</div>
  </div>
</div>

<script>
  // 🔧 Replace with your Apps Script Web App URL
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyNXsuOGzu0CV9cpfUrt7ZGH1D5mWWssPzqtLKp4Eb0k0WtzHlxkILQH7ns1rvZx6CGAA/exec";

  let stream = null;
  let scanInterval = null;
  let currentDetected = null;
  let isProcessing = false;

  // ── Open Scanner ────────────────────────────────────────────
  async function openScanner() {
    document.getElementById('modalOverlay').classList.add('active');
    resetDetection();
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
      });
      const video = document.getElementById('video');
      video.srcObject = stream;
      await video.play();
      startLiveScan();
    } catch (err) {
      setDetectedText('⚠ Camera error: ' + err.message, false);
    }
  }

  // ── Close Scanner ───────────────────────────────────────────
  function closeScanner() {
    stopLiveScan();
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    document.getElementById('modalOverlay').classList.remove('active');
    resetDetection();
  }

  // ── Reset UI ────────────────────────────────────────────────
  function resetDetection() {
    currentDetected = null;
    isProcessing = false;
    const num = document.getElementById('detectedNumber');
    num.textContent = 'Scanning…';
    num.className = 'detected-number scanning';
    document.getElementById('confirmBtn').classList.remove('visible');
    clearOverlay();
  }

  // ── Live Scanning Loop ──────────────────────────────────────
  function startLiveScan() {
    stopLiveScan();
    const video = document.getElementById('video');
    const overlayCanvas = document.getElementById('overlayCanvas');
    const ctx = overlayCanvas.getContext('2d');

    // Hidden canvas for frame capture
    const captureCanvas = document.createElement('canvas');
    const captureCtx = captureCanvas.getContext('2d');

    scanInterval = setInterval(async () => {
      if (isProcessing || video.readyState !== video.HAVE_ENOUGH_DATA) return;

      // Sync overlay canvas size to video
      overlayCanvas.width = video.videoWidth;
      overlayCanvas.height = video.videoHeight;

      // Capture frame
      captureCanvas.width = video.videoWidth;
      captureCanvas.height = video.videoHeight;
      captureCtx.drawImage(video, 0, 0);

      // Extract bottom 40% where large number lives
      const cropY = Math.floor(video.videoHeight * 0.55);
      const cropH = Math.floor(video.videoHeight * 0.40);
      const cropCanvas = document.createElement('canvas');
      cropCanvas.width = video.videoWidth;
      cropCanvas.height = cropH;
      const cropCtx = cropCanvas.getContext('2d');
      cropCtx.filter = 'contrast(2) brightness(1.1) grayscale(1)';
      cropCtx.drawImage(captureCanvas, 0, cropY, video.videoWidth, cropH, 0, 0, video.videoWidth, cropH);

      isProcessing = true;
      try {
        const number = await extractNumberFromCanvas(cropCanvas);
        if (number && number.length >= 8) {
          currentDetected = number;
          setDetectedText(number, true);
          drawHighlight(ctx, overlayCanvas, cropY, cropH);
          document.getElementById('confirmBtn').classList.add('visible');
        } else {
          clearOverlay();
          if (!currentDetected) {
            setDetectedText('Scanning…', false);
            document.getElementById('confirmBtn').classList.remove('visible');
          }
        }
      } catch (e) { /* keep scanning */ }
      isProcessing = false;

    }, 800); // scan every 800ms
  }

  function stopLiveScan() {
    if (scanInterval) { clearInterval(scanInterval); scanInterval = null; }
  }

  // ── OCR using canvas + Tesseract-lite approach ──────────────
  async function extractNumberFromCanvas(canvas) {
    return new Promise((resolve) => {
      const imageData = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;

      // Simple digit extraction using pixel analysis
      // Convert to blob and use createImageBitmap for processing
      canvas.toBlob(async (blob) => {
        try {
          // Use TextDetector if available (Chrome Android, Edge)
          if ('TextDetector' in window) {
            const textDetector = new TextDetector();
            const bitmap = await createImageBitmap(blob);
            const texts = await textDetector.detect(bitmap);
            
            let bestNumber = null;
            for (const text of texts) {
              const digits = text.rawValue.replace(/\s/g, '').match(/\d{8,}/g);
              if (digits) {
                const candidate = digits.reduce((a, b) => a.length >= b.length ? a : b);
                if (!bestNumber || candidate.length > bestNumber.length) {
                  bestNumber = candidate;
                }
              }
            }
            resolve(bestNumber);
          } else {
            // Fallback: use canvas pixel sampling for digit-like patterns
            resolve(null);
          }
        } catch (e) {
          resolve(null);
        }
      }, 'image/jpeg', 0.9);
    });
  }

  // ── Draw highlight box over detected area ───────────────────
  function drawHighlight(ctx, canvas, cropY, cropH) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const padding = 20;
    const x = padding;
    const y = cropY - padding;
    const w = canvas.width - padding * 2;
    const h = cropH + padding * 2;

    // Dim overlay
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Clear highlight area
    ctx.clearRect(x, y, w, h);

    // Green border
    ctx.strokeStyle = '#c8f135';
    ctx.lineWidth = 3;
    ctx.shadowColor = '#c8f135';
    ctx.shadowBlur = 10;
    ctx.strokeRect(x, y, w, h);
    ctx.shadowBlur = 0;

    // Corner markers
    const cs = 20;
    ctx.strokeStyle = '#c8f135';
    ctx.lineWidth = 4;
    [[x,y],[x+w,y],[x,y+h],[x+w,y+h]].forEach(([cx,cy], i) => {
      ctx.beginPath();
      ctx.moveTo(cx + (i%2===0 ? cs : -cs), cy);
      ctx.lineTo(cx, cy);
      ctx.lineTo(cx, cy + (i<2 ? cs : -cs));
      ctx.stroke();
    });
  }

  function clearOverlay() {
    const canvas = document.getElementById('overlayCanvas');
    canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
  }

  function setDetectedText(text, found) {
    const el = document.getElementById('detectedNumber');
    el.textContent = text;
    el.className = found ? 'detected-number' : 'detected-number scanning';
  }

  // ── Confirm number ──────────────────────────────────────────
  function confirmNumber() {
    if (!currentDetected) return;
    document.getElementById('serial').value = currentDetected;
    closeScanner();
  }

  // ── Submit to Sheet ─────────────────────────────────────────
  async function handleSubmit() {
    const serial = document.getElementById("serial").value.trim();
    const btn = document.getElementById("submitBtn");
    const status = document.getElementById("status");
    status.className = "status";

    if (!serial) {
      status.className = "status error";
      status.textContent = "⚠ Please enter a Serial value.";
      return;
    }

    btn.disabled = true;
    btn.textContent = "Submitting…";

    try {
      const formData = new FormData();
      formData.append('payload', JSON.stringify({ action: 'saveData', serial: serial }));

      const response = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: formData
      });

      const data = await response.json();
      if (data.status === 'success') {
        status.className = "status success";
        status.textContent = "✓ Row added to testsheet!";
        document.getElementById("serial").value = "";
      } else {
        throw new Error(data.error || 'Unknown error');
      }
    } catch (err) {
      status.className = "status error";
      status.textContent = "✗ Failed: " + err.message;
    }
    btn.disabled = false;
    btn.textContent = "Submit to Sheet";
  }

  document.getElementById("serial").addEventListener("keydown", e => {
    if (e.key === "Enter") handleSubmit();
  });
</script>
</body>
</html>
