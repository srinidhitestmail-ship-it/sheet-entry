<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Permissions-Policy" content="camera=*">
  <title>Data Entry</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f; --surface: #1a1a1a; --border: #2e2e2e;
      --accent: #c8f135; --text: #f0f0f0; --muted: #666;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center; padding: 2rem;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 2.5rem 2rem;
      width: 100%; max-width: 440px;
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .sheet-label { font-size: 0.7rem; color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 0.4rem; }
    h1 { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; margin-bottom: 0.3rem; }
    .sub { font-size: 0.75rem; color: var(--muted); margin-bottom: 2rem; }
    .divider { height: 1px; background: var(--border); margin-bottom: 1.8rem; }
    label { display: block; font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }
    .input-row { display: flex; gap: 0.5rem; align-items: center; }
    input[type="text"] {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.75rem 1rem;
      font-family: 'DM Mono', monospace; font-size: 0.95rem;
      color: var(--text); outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(200,241,53,0.1); }
    input::placeholder { color: #3a3a3a; }
    .field-hint { font-size: 0.68rem; color: #444; margin-top: 0.4rem; }
    .scan-btn {
      background: #1f1f1f; border: 1px solid var(--border);
      border-radius: 8px; padding: 0.75rem 0.85rem;
      cursor: pointer; color: var(--accent); font-size: 1.2rem;
      transition: background 0.2s, border-color 0.2s;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .scan-btn:hover { background: #252525; border-color: var(--accent); }
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.85); z-index: 100;
      align-items: center; justify-content: center; padding: 1rem;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 1.5rem;
      width: 100%; max-width: 400px;
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .modal-title { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; }
    .close-btn { background: none; border: none; color: var(--muted); font-size: 1.2rem; cursor: pointer; padding: 0.2rem 0.4rem; }
    .close-btn:hover { color: var(--text); }
    .video-wrap {
      position: relative; width: 100%; border-radius: 10px;
      overflow: hidden; background: #000; aspect-ratio: 4/3;
    }
    video { width: 100%; height: 100%; object-fit: cover; display: block; }
    canvas { display: none; }
    .target-zone {
      position: absolute; left: 5%; right: 5%;
      bottom: 8%; height: 30%;
      border: 2px solid var(--accent); border-radius: 6px;
      box-shadow: 0 0 0 2000px rgba(0,0,0,0.5);
    }
    .target-label {
      position: absolute; top: -22px; left: 0;
      font-size: 0.65rem; color: var(--accent);
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    .corner { position: absolute; width: 14px; height: 14px; border-color: var(--accent); border-style: solid; }
    .corner.tl { top: -2px; left: -2px; border-width: 3px 0 0 3px; border-radius: 3px 0 0 0; }
    .corner.tr { top: -2px; right: -2px; border-width: 3px 3px 0 0; border-radius: 0 3px 0 0; }
    .corner.bl { bottom: -2px; left: -2px; border-width: 0 0 3px 3px; border-radius: 0 0 0 3px; }
    .corner.br { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; border-radius: 0 0 3px 0; }
    .scan-status {
      margin-top: 0.8rem; text-align: center;
      font-size: 0.75rem; color: var(--muted); min-height: 1.4rem; line-height: 1.5;
    }
    .scan-status.found { color: var(--accent); font-weight: 500; }
    .scan-status.error { color: #ff6b6b; }
    .scan-status.working { color: #f0a500; }
    .capture-btn {
      width: 100%; margin-top: 1rem; background: var(--accent); color: #0f0f0f;
      border: none; border-radius: 8px; padding: 0.85rem;
      font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: background 0.15s, transform 0.15s;
      letter-spacing: 0.05em;
    }
    .capture-btn:hover { background: #d8ff3a; transform: translateY(-1px); }
    .capture-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .tip { margin-top: 0.8rem; font-size: 0.68rem; color: #444; text-align: center; line-height: 1.6; }
    button.submit-btn {
      margin-top: 1.8rem; width: 100%; background: var(--accent);
      color: #0f0f0f; border: none; border-radius: 8px; padding: 0.85rem;
      font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; letter-spacing: 0.05em; transition: transform 0.15s, box-shadow 0.15s;
    }
    button.submit-btn:hover { background: #d8ff3a; box-shadow: 0 4px 20px rgba(200,241,53,0.3); transform: translateY(-1px); }
    button.submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .status { margin-top: 1rem; padding: 0.65rem 1rem; border-radius: 8px; font-size: 0.78rem; text-align: center; display: none; }
    .status.success { display: block; background: rgba(200,241,53,0.08); border: 1px solid rgba(200,241,53,0.3); color: var(--accent); }
    .status.error { display: block; background: rgba(255,80,80,0.08); border: 1px solid rgba(255,80,80,0.3); color: #ff6b6b; }
    .footer { margin-top: 2rem; text-align: center; font-size: 0.65rem; color: #333; letter-spacing: 0.08em; }
  </style>
</head>
<body>

<div class="card">
  <div class="sheet-label">testsheet · col A</div>
  <h1>Data Entry</h1>
  <p class="sub">Scan label or type serial number</p>
  <div class="divider"></div>
  <label for="serial">Serial</label>
  <div class="input-row">
    <input type="text" id="serial" placeholder="e.g. 250324960024" autocomplete="off"/>
    <button class="scan-btn" onclick="openScanner()" title="Scan label">📷</button>
  </div>
  <div class="field-hint">Maps to → Serial (Column A) · 12-digit number</div>
  <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">Submit to Sheet</button>
  <div class="status" id="status"></div>
  <div class="footer">TESTSHEET · GOOGLE SHEETS CONNECTOR</div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">📷 Scan Label</span>
      <button class="close-btn" onclick="closeScanner()">✕</button>
    </div>
    <div class="video-wrap">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
      <div class="target-zone">
        <div class="target-label">Align big number here</div>
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
      </div>
    </div>
    <div class="scan-status" id="scanStatus">Align the big number inside the box</div>
    <button class="capture-btn" id="captureBtn" onclick="captureAndRead()">📸 Capture Number</button>
    <div class="tip">💡 Hold label flat · fill the frame · good lighting</div>
  </div>
</div>

<script>
  // 🔧 Replace with your Apps Script Web App URL
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyNXsuOGzu0CV9cpfUrt7ZGH1D5mWWssPzqtLKp4Eb0k0WtzHlxkILQH7ns1rvZx6CGAA/exec";

  let stream = null;

  async function openScanner() {
    document.getElementById('modalOverlay').classList.add('active');
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
      });
      document.getElementById('video').srcObject = stream;
      await document.getElementById('video').play();
      document.getElementById('captureBtn').disabled = true;
      document.getElementById('scanStatus').textContent = 'Camera focusing…';
      document.getElementById('scanStatus').className = 'scan-status working';
      setTimeout(() => {
        document.getElementById('captureBtn').disabled = false;
        document.getElementById('scanStatus').textContent = 'Align the big number inside the box';
        document.getElementById('scanStatus').className = 'scan-status';
      }, 1500);
    } catch (err) {
      document.getElementById('scanStatus').textContent = '⚠ Camera error: ' + err.message;
      document.getElementById('scanStatus').className = 'scan-status error';
    }
  }

  function closeScanner() {
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    document.getElementById('modalOverlay').classList.remove('active');
    document.getElementById('captureBtn').disabled = false;
    document.getElementById('captureBtn').textContent = '📸 Capture Number';
    document.getElementById('scanStatus').textContent = 'Align the big number inside the box';
    document.getElementById('scanStatus').className = 'scan-status';
  }

  async function captureAndRead() {
    const btn = document.getElementById('captureBtn');
    const status = document.getElementById('scanStatus');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    btn.disabled = true;
    btn.textContent = '⏳ Reading…';
    status.textContent = 'Sending to Gemini…';
    status.className = 'scan-status working';

    await new Promise(r => setTimeout(r, 300));

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);

    const base64Image = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];

    try {
      const response = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'readLabel', image: base64Image })
      });

      const data = await response.json();

      if (data.result && data.result.length >= 8) {
        fillAndClose(data.result, `✓ Captured: ${data.result}`);
      } else {
        status.textContent = '⚠ Could not read — try again with better lighting';
        status.className = 'scan-status error';
        btn.disabled = false;
        btn.textContent = '📸 Capture Number';
      }
    } catch (err) {
      status.textContent = '⚠ Error: ' + err.message;
      status.className = 'scan-status error';
      btn.disabled = false;
      btn.textContent = '📸 Capture Number';
    }
  }

  function fillAndClose(value, msg) {
    document.getElementById('scanStatus').textContent = msg;
    document.getElementById('scanStatus').className = 'scan-status found';
    document.getElementById('serial').value = value;
    setTimeout(() => closeScanner(), 1000);
  }

  async function handleSubmit() {
    const serial = document.getElementById("serial").value.trim();
    const btn = document.getElementById("submitBtn");
    const status = document.getElementById("status");
    status.className = "status";
    if (!serial) {
      status.className = "status error";
      status.textContent = "⚠ Please enter a Serial value.";
      return;
    }
    btn.disabled = true;
    btn.textContent = "Submitting…";
    try {
      const response = await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: 'saveData', serial: serial })
      });
      const data = await response.json();
      if (data.status === 'success') {
        status.className = "status success";
        status.textContent = "✓ Row added to testsheet!";
        document.getElementById("serial").value = "";
      } else {
        throw new Error(data.error || 'Unknown error');
      }
    } catch (err) {
      status.className = "status error";
      status.textContent = "✗ Submission failed: " + err.message;
    }
    btn.disabled = false;
    btn.textContent = "Submit to Sheet";
  }

  document.getElementById("serial").addEventListener("keydown", e => {
    if (e.key === "Enter") handleSubmit();
  });
</script>
</body>
</html>
