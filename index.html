<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Permissions-Policy" content="camera=*">
  <title>Data Entry</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/zxing-js/0.20.0/zxing.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.0.4/tesseract.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f; --surface: #1a1a1a; --border: #2e2e2e;
      --accent: #c8f135; --text: #f0f0f0; --muted: #666;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center; padding: 2rem;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 2.5rem 2rem;
      width: 100%; max-width: 440px;
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .sheet-label { font-size: 0.7rem; color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 0.4rem; }
    h1 { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; margin-bottom: 0.3rem; }
    .sub { font-size: 0.75rem; color: var(--muted); margin-bottom: 2rem; }
    .divider { height: 1px; background: var(--border); margin-bottom: 1.8rem; }
    label { display: block; font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }
    .input-row { display: flex; gap: 0.5rem; align-items: center; }
    input[type="text"] {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.75rem 1rem;
      font-family: 'DM Mono', monospace; font-size: 0.95rem;
      color: var(--text); outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(200,241,53,0.1); }
    input::placeholder { color: #3a3a3a; }
    .field-hint { font-size: 0.68rem; color: #444; margin-top: 0.4rem; }
    .scan-btn {
      background: #1f1f1f; border: 1px solid var(--border);
      border-radius: 8px; padding: 0.75rem 0.85rem;
      cursor: pointer; color: var(--accent); font-size: 1.2rem;
      transition: background 0.2s, border-color 0.2s;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .scan-btn:hover { background: #252525; border-color: var(--accent); }
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.85); z-index: 100;
      align-items: center; justify-content: center; padding: 1rem;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 1.5rem;
      width: 100%; max-width: 400px;
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .modal-title { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; }
    .close-btn { background: none; border: none; color: var(--muted); font-size: 1.2rem; cursor: pointer; padding: 0.2rem 0.4rem; border-radius: 4px; }
    .close-btn:hover { color: var(--text); }
    .video-wrap { position: relative; width: 100%; border-radius: 10px; overflow: hidden; background: #000; aspect-ratio: 4/3; }
    video { width: 100%; height: 100%; object-fit: cover; display: block; }
    canvas { display: none; }
    .scan-line {
      position: absolute; left: 10%; right: 10%; height: 2px;
      background: var(--accent); box-shadow: 0 0 8px var(--accent);
      animation: scanMove 2s ease-in-out infinite; top: 20%;
    }
    @keyframes scanMove { 0%, 100% { top: 20%; } 50% { top: 75%; } }
    .viewfinder { position: absolute; inset: 15%; border: 2px solid rgba(200,241,53,0.4); border-radius: 8px; }
    .corner { position: absolute; width: 16px; height: 16px; border-color: var(--accent); border-style: solid; }
    .corner.tl { top: -2px; left: -2px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    .corner.tr { top: -2px; right: -2px; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
    .corner.bl { bottom: -2px; left: -2px; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
    .corner.br { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
    .scan-status { margin-top: 0.8rem; text-align: center; font-size: 0.75rem; color: var(--muted); min-height: 1.2rem; }
    .scan-status.found { color: var(--accent); }
    .scan-status.ocr { color: #f0a500; }
    .mode-tabs { display: flex; gap: 0.5rem; margin-top: 1rem; }
    .mode-tab {
      flex: 1; padding: 0.5rem; border-radius: 6px;
      border: 1px solid var(--border); background: var(--bg);
      color: var(--muted); font-family: 'DM Mono', monospace;
      font-size: 0.72rem; cursor: pointer; text-align: center; transition: all 0.2s;
    }
    .mode-tab.active { background: rgba(200,241,53,0.1); border-color: var(--accent); color: var(--accent); }
    .capture-btn {
      width: 100%; margin-top: 1rem; background: var(--accent); color: #0f0f0f;
      border: none; border-radius: 8px; padding: 0.75rem;
      font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700;
      cursor: pointer; transition: background 0.15s, transform 0.15s; display: none;
    }
    .capture-btn:hover { background: #d8ff3a; transform: translateY(-1px); }
    .capture-btn.visible { display: block; }
    button.submit-btn {
      margin-top: 1.8rem; width: 100%; background: var(--accent);
      color: #0f0f0f; border: none; border-radius: 8px; padding: 0.85rem;
      font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; letter-spacing: 0.05em; transition: transform 0.15s, box-shadow 0.15s;
    }
    button.submit-btn:hover { background: #d8ff3a; box-shadow: 0 4px 20px rgba(200,241,53,0.3); transform: translateY(-1px); }
    button.submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .status { margin-top: 1rem; padding: 0.65rem 1rem; border-radius: 8px; font-size: 0.78rem; text-align: center; display: none; }
    .status.success { display: block; background: rgba(200,241,53,0.08); border: 1px solid rgba(200,241,53,0.3); color: var(--accent); }
    .status.error { display: block; background: rgba(255,80,80,0.08); border: 1px solid rgba(255,80,80,0.3); color: #ff6b6b; }
    .footer { margin-top: 2rem; text-align: center; font-size: 0.65rem; color: #333; letter-spacing: 0.08em; }
  </style>
</head>
<body>
<div class="card">
  <div class="sheet-label">testsheet · col A</div>
  <h1>Data Entry</h1>
  <p class="sub">Type, scan, or capture a number</p>
  <div class="divider"></div>
  <label for="serial">Serial</label>
  <div class="input-row">
    <input type="text" id="serial" placeholder="e.g. SN-00142" autocomplete="off"/>
    <button class="scan-btn" onclick="openScanner()" title="Scan with camera">📷</button>
  </div>
  <div class="field-hint">Maps to → Serial (Column A)</div>
  <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">Submit to Sheet</button>
  <div class="status" id="status"></div>
  <div class="footer">TESTSHEET · GOOGLE SHEETS CONNECTOR</div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">📷 Scan Serial</span>
      <button class="close-btn" onclick="closeScanner()">✕</button>
    </div>
    <div class="video-wrap">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
      <div class="scan-line"></div>
      <div class="viewfinder">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
      </div>
    </div>
    <div class="scan-status" id="scanStatus">Initializing camera…</div>
    <div class="mode-tabs">
      <div class="mode-tab active" id="tabBarcode" onclick="setMode('barcode')">⚡ Barcode / QR</div>
      <div class="mode-tab" id="tabOCR" onclick="setMode('ocr')">🔤 Plain Number</div>
    </div>
    <button class="capture-btn" id="captureBtn" onclick="captureOCR()">📸 Capture & Read Number</button>
  </div>
</div>

<script>
  // 🔧 PASTE YOUR APPS SCRIPT WEB APP URL HERE
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyNXsuOGzu0CV9cpfUrt7ZGH1D5mWWssPzqtLKp4Eb0k0WtzHlxkILQH7ns1rvZx6CGAA/exec";

  let stream = null;
  let barcodeReader = null;
  let scanMode = 'barcode';
  let barcodeInterval = null;

  function setMode(mode) {
    scanMode = mode;
    document.getElementById('tabBarcode').classList.toggle('active', mode === 'barcode');
    document.getElementById('tabOCR').classList.toggle('active', mode === 'ocr');
    document.getElementById('captureBtn').classList.toggle('visible', mode === 'ocr');
    if (mode === 'barcode') {
      document.getElementById('scanStatus').textContent = 'Point at a barcode or QR code…';
      document.getElementById('scanStatus').className = 'scan-status';
      startBarcodeScanning();
    } else {
      document.getElementById('scanStatus').textContent = 'Frame the number, then tap Capture.';
      document.getElementById('scanStatus').className = 'scan-status ocr';
      stopBarcodeScanning();
    }
  }

  async function openScanner() {
    document.getElementById('modalOverlay').classList.add('active');
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
      });
      document.getElementById('video').srcObject = stream;
      await document.getElementById('video').play();
      setMode('barcode');
    } catch (err) {
      document.getElementById('scanStatus').textContent = '⚠ Camera error: ' + err.message;
    }
  }

  function closeScanner() {
    stopBarcodeScanning();
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    document.getElementById('modalOverlay').classList.remove('active');
    document.getElementById('scanStatus').textContent = 'Initializing camera…';
  }

  function startBarcodeScanning() {
    stopBarcodeScanning();
    try {
      const hints = new Map();
      hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
        ZXing.BarcodeFormat.QR_CODE, ZXing.BarcodeFormat.CODE_128,
        ZXing.BarcodeFormat.CODE_39, ZXing.BarcodeFormat.EAN_13,
        ZXing.BarcodeFormat.EAN_8, ZXing.BarcodeFormat.DATA_MATRIX,
        ZXing.BarcodeFormat.ITF, ZXing.BarcodeFormat.UPC_A, ZXing.BarcodeFormat.UPC_E,
      ]);
      barcodeReader = new ZXing.MultiFormatReader();
      barcodeReader.setHints(hints);
    } catch(e) { return; }

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    barcodeInterval = setInterval(() => {
      if (video.readyState !== video.HAVE_ENOUGH_DATA) return;
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      try {
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const luminance = new ZXing.RGBLuminanceSource(imgData.data, canvas.width, canvas.height);
        const bitmap = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(luminance));
        const result = barcodeReader.decode(bitmap);
        if (result) fillAndClose(result.getText(), '⚡ Barcode detected!');
      } catch (e) {}
    }, 300);
  }

  function stopBarcodeScanning() {
    if (barcodeInterval) { clearInterval(barcodeInterval); barcodeInterval = null; }
  }

  async function captureOCR() {
    const btn = document.getElementById('captureBtn');
    const status = document.getElementById('scanStatus');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    btn.disabled = true;
    btn.textContent = '⏳ Reading…';
    status.textContent = 'Running OCR, please wait…';
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    try {
      const worker = await Tesseract.createWorker('eng');
      await worker.setParameters({ tessedit_char_whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz-_.' });
      const { data: { text } } = await worker.recognize(canvas);
      await worker.terminate();
      const match = text.replace(/\s+/g, ' ').trim().match(/[A-Za-z0-9][A-Za-z0-9\-_.]+/);
      if (match) {
        fillAndClose(match[0], '🔤 Text captured via OCR!');
      } else {
        status.textContent = '⚠ No text found — try again.';
        btn.disabled = false;
        btn.textContent = '📸 Capture & Read Number';
      }
    } catch (err) {
      status.textContent = '⚠ OCR failed: ' + err.message;
      btn.disabled = false;
      btn.textContent = '📸 Capture & Read Number';
    }
  }

  function fillAndClose(value, msg) {
    document.getElementById('scanStatus').textContent = msg;
    document.getElementById('scanStatus').className = 'scan-status found';
    document.getElementById('serial').value = value;
    setTimeout(() => closeScanner(), 800);
  }

  async function handleSubmit() {
    const serial = document.getElementById("serial").value.trim();
    const btn = document.getElementById("submitBtn");
    const status = document.getElementById("status");
    status.className = "status";
    if (!serial) {
      status.className = "status error";
      status.textContent = "⚠ Please enter a Serial value.";
      return;
    }
    btn.disabled = true;
    btn.textContent = "Submitting…";
    try {
      await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ serial })
      });
      status.className = "status success";
      status.textContent = "✓ Row added to testsheet!";
      document.getElementById("serial").value = "";
    } catch (err) {
      status.className = "status error";
      status.textContent = "✗ Submission failed.";
    }
    btn.disabled = false;
    btn.textContent = "Submit to Sheet";
  }

  document.getElementById("serial").addEventListener("keydown", e => {
    if (e.key === "Enter") handleSubmit();
  });
</script>
</body>
</html>
